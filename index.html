<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
                    </div>
                    <ul
                        tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                        <li><a><i class="fa-solid fa-circle-question"></i>FAQ</a></li>
                        <li><a><i class="fa-solid fa-book-open"></i>Learn</a></li>
                        <li><a><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a></li>
                    </ul>
                </div>
                <a class="btn btn-ghost text-xl">
                    <span class="text-lg font-bold">English</span>
                    <img src="assets/logo.png" alt="">
                    <span class="font-bangla text-lg font-semibold">জানালা</span>
                </a>
            </div>
            <div class="navbar-end hidden sm:flex">
                <a class="btn btn-outline btn-primary mx-4"><i class="fa-solid fa-circle-question"></i>FAQ</a>
                <a class="btn btn-outline btn-primary mx-4"><i class="fa-solid fa-book-open"></i>Learn</a>
                <a class="btn btn-outline btn-primary mx-4"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </div>

    <section class="flex flex-col-reverse md:flex-row gap-4 w-11/12 mx-auto justify-center items-center py-5">
        <div class="content text-center md:text-left">
            <h2 class="text-2xl font-bold"><span class="text-[#00BCFF]">English</span> is Easy</h2>
            <p class="font-bangla py-5">
                আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা 
                আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে 
                যাবে অন্য একটি Level এ
            </p>
            <div class="">
                <input type="text" placeholder="Enter your name" class="input" /><br><br>
                <input type="text" placeholder="......" class="input" /> <br><br>
                <button class="btn btn-primary">Get Started</button>
            </div>
        </div>
        <div class="image">
            <img src="assets/hero-student.png" alt="">
        </div>
    </section>

    <section>
        <h2 class="text-2xl font-bold text-center my-2"><span class="text-[#00BCFF]">Let's</span> learn Vocabulary</h2>
        <div id="level-container" class="flex flex-wrap gap-3 justify-center my-5">

        </div>
    </section>
    <!--Lessons clicked Section-->
    <section id="word-container" class="bg-gray-100 py-8 w-11/12 mx-auto my-8 grid grid-cols-4 gap-4">
